# LLM Security Gateway - Configuration File
# Place this in: config/gateway_config.yaml
policy:
  # Final risk threshold for BLOCK decision
  block_threshold: 0.65
  # Final risk threshold for MASK decision (below block)
  mask_threshold: 0.20

scoring:
  # Weight for rule-based score in final risk formula
  rule_weight: 0.5
  # Weight for semantic/ML score in final risk formula
  semantic_weight: 0.5
  # Added to final risk if PII is detected
  pii_weight: 0.10
  # Added to final risk if composite PII entity detected
  composite_weight: 0.10
  # Added to final risk if secret/credential detected
  secret_weight: 0.15

detection:
  # Minimum confidence for Presidio PII entities to count
  presidio_threshold: 0.6
  # Semantic model score above this = high confidence attack
  semantic_high_confidence: 0.80

languages:
  supported:
    - en
    - ur
    - ko
  default: en

audit:
  # Save audit logs to this file
  log_file: "results/audit_log.jsonl"
  enabled: true
model:
  # Path to saved TF-IDF + LR model (generated by training)
  model_path: "app/detectors/tfidf_lr_model.pkl"